services:
  share:
    build: .
    ports:
      - "${PORT:-3333}:${PORT:-3333}"
    environment:
      - HOST=0.0.0.0
      # REQUEST_LOG=debug   # all | none | debug — filtra il logging
      # Variabili già impostate nel Dockerfile (sovrascrivibili qui):
      # NODE_ENV=production
      # PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const p=process.env.PORT||3333; fetch('http://127.0.0.1:'+p+'/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
