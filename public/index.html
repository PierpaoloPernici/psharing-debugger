<!DOCTYPE html>
<html lang="it" class="antialiased">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pCube Sharing Debugger</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
(function(){var t=localStorage.getItem('pcube-theme')||'system',d=t==='dark'||(t==='system'&&window.matchMedia('(prefers-color-scheme:dark)').matches);if(d)document.documentElement.classList.add('dark');})();
</script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors">

<!-- ── Header ──────────────────────────────────── -->
<header class="relative overflow-hidden bg-gradient-to-b from-slate-100 to-slate-50 dark:from-slate-800 dark:to-slate-900 border-b border-slate-200 dark:border-slate-700">
  <div class="absolute inset-0 opacity-5 bg-[radial-gradient(circle_at_30%_20%,white,transparent_60%)]"></div>
  <div class="relative z-10 max-w-3xl mx-auto px-4 py-12 sm:py-14 text-center">
    <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600/10 dark:bg-indigo-500/10 mb-4 ring-1 ring-indigo-500/20">
      <i data-lucide="share-2" class="w-6 h-6 text-indigo-600 dark:text-indigo-400"></i>
    </div>
    <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">pCube Sharing Debugger</h1>
    <p class="mt-1.5 text-sm sm:text-base text-slate-500 dark:text-slate-400">Anteprima/debugger social sharing</p>
  </div>
</header>

<!-- ── Main ─────────────────────────────────────── -->
<main class="max-w-3xl mx-auto px-4 -mt-8 relative z-20 pb-16">

  <!-- URL Form -->
  <form id="debug-form" class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-black/20 border border-slate-200 dark:border-slate-700 p-5 sm:p-6 mb-8">
    <div class="flex flex-col sm:flex-row gap-3">
      <input
        type="text"
        id="url-input"
        placeholder="https://esempio.com/pagina"
        required
        autofocus
        class="flex-1 px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-sm placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-shadow"
      >
      <button type="button" id="paste-btn" title="Incolla da clipboard" class="px-3 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 hover:border-slate-400 dark:hover:border-slate-500 transition-all shrink-0">
        <i data-lucide="clipboard" class="w-5 h-5"></i>
      </button>
      <button type="submit" class="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold text-sm shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/35 transition-all whitespace-nowrap">
        Analizza
      </button>
    </div>

    <label class="inline-flex items-center gap-3 mt-5 cursor-pointer select-none group">
      <input type="checkbox" id="js-toggle" class="sr-only peer">
      <div class="relative w-11 h-6 bg-slate-300 dark:bg-slate-600 peer-checked:bg-indigo-500 rounded-full transition-colors after:content-[''] after:absolute after:top-[3px] after:start-[3px] after:w-[18px] after:h-[18px] after:bg-white after:rounded-full after:shadow-sm after:transition-all peer-checked:after:translate-x-5"></div>
      <span class="text-sm text-slate-500 dark:text-slate-400 group-hover:text-slate-700 dark:group-hover:text-slate-300 transition-colors">Rendering JavaScript (SPA)</span>
    </label>
  </form>

  <!-- Theme -->
  <div class="flex items-center justify-center gap-1 mb-8">
    <button data-theme="system" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
      <i data-lucide="monitor" class="w-3.5 h-3.5"></i>
      System
    </button>
    <button data-theme="light" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
      <i data-lucide="sun" class="w-3.5 h-3.5"></i>
      Light
    </button>
    <button data-theme="dark" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
      <i data-lucide="moon" class="w-3.5 h-3.5"></i>
      Dark
    </button>
  </div>

  <!-- Loading -->
  <div id="loading" class="hidden text-center py-12">
    <div class="spinner mx-auto mb-4"></div>
    <p class="text-sm text-slate-400">Analisi in corso…</p>
  </div>

  <!-- Error -->
  <section id="error" class="hidden mb-8">
    <div class="rounded-xl border border-red-200 dark:border-red-800 bg-red-50 dark:bg-red-900/30 px-5 py-4 text-sm text-red-700 dark:text-red-300">
      <span class="error-msg"></span>
    </div>
  </section>

  <!-- Results -->
  <section id="results" class="hidden space-y-8">

    <!-- Warnings -->
    <div id="warnings" class="space-y-2"></div>

    <!-- Site info -->
    <div id="site-info" class="hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4 shadow-sm">
      <div class="flex items-center gap-4">
        <div id="favicon-wrap" class="w-10 h-10 rounded-lg bg-[#d1d5db] flex items-center justify-center overflow-hidden ring-1 ring-black/10 shrink-0">
          <img id="favicon-img" class="w-6 h-6 hidden" alt="" onerror="this.classList.add('hidden')">
          <i id="favicon-fallback" data-lucide="globe" class="w-5 h-5 text-[#6b7280]"></i>
        </div>
        <div class="min-w-0">
          <div id="site-domain" class="text-sm font-medium text-slate-800 dark:text-slate-200 truncate"></div>
          <div id="site-meta" class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 flex items-center gap-2">
            <span id="site-meta-text"></span>
            <span id="mode-badge" class="hidden"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Screenshot -->
    <div id="screenshot-wrap" class="hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 overflow-hidden shadow-sm">
      <div class="flex items-center gap-2 px-5 py-3 border-b border-slate-100 dark:border-slate-700/50">
        <i data-lucide="camera" class="w-4 h-4 text-slate-400"></i>
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Screenshot (JS render)</h2>
      </div>
      <div class="p-3">
        <img id="screenshot-img" class="w-full rounded-lg border border-slate-200 dark:border-slate-700" alt="Page screenshot">
      </div>
    </div>

    <!-- Preview cards grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Facebook -->
      <div id="preview-facebook" class="md:col-span-2">
        <div class="flex items-center gap-2 mb-3">
          <svg class="w-5 h-5 text-[#1877f2]" viewBox="0 0 24 24" fill="currentColor">
            <path d="M24 12.073c0-6.627-5.373-12-12-12S0 5.446 0 12.073c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Facebook</h2>
        </div>
        <div class="shadow-sm">
          <div class="card-facebook"></div>
        </div>
      </div>

      <!-- Twitter / X -->
      <div id="preview-twitter">
        <div class="flex items-center gap-2 mb-3">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Twitter / X</h2>
        </div>
        <div class="shadow-sm">
          <div class="card-twitter"></div>
        </div>
      </div>

      <!-- LinkedIn -->
      <div id="preview-linkedin">
        <div class="flex items-center gap-2 mb-3">
          <svg class="w-5 h-5 text-[#0a66c2]" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
          <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">LinkedIn</h2>
        </div>
        <div class="shadow-sm">
          <div class="card-linkedin"></div>
        </div>
      </div>
    </div>

    <!-- Raw metadata -->
    <details id="raw-data" class="group rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 overflow-hidden shadow-sm">
      <summary class="flex items-center gap-2 px-5 py-3.5 text-sm font-semibold text-slate-600 dark:text-slate-300 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors select-none marker:content-none list-none">
        <i data-lucide="chevron-right" class="w-4 h-4 transition-transform group-open:rotate-90 text-slate-400"></i>
        Metadata grezzi
        <button type="button" id="report-btn"
          class="ml-auto inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
          title="Copia report della sessione" disabled>
          <i data-lucide="clipboard-copy" class="w-3.5 h-3.5"></i>
          <span class="report-label">Report</span>
        </button>
      </summary>
      <div class="overflow-x-auto border-t border-slate-100 dark:border-slate-700/50">
        <table class="w-full text-xs sm:text-sm">
          <thead>
            <tr class="bg-slate-50 dark:bg-slate-800/50">
              <th class="text-left px-5 py-2.5 font-semibold text-slate-500 dark:text-slate-400 w-[35%]">Proprietà</th>
              <th class="text-left px-5 py-2.5 font-semibold text-slate-500 dark:text-slate-400">Valore</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100 dark:divide-slate-700/50"></tbody>
        </table>
      </div>
    </details>
  </section>

  <!-- Footer -->
  <p class="mt-12 text-center text-xs text-slate-400 dark:text-slate-600">
    Powered by <a href="https://pcube.io" class="text-indigo-500 dark:text-indigo-400 hover:underline">pcube.io</a>
  </p>
</main>

<script src="app.js"></script>
</body>
</html>
